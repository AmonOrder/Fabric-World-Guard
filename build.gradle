plugins {
	id 'fabric-loom' version '1.5-SNAPSHOT' // Полностью совместим с Gradle 8.5
	id 'maven-publish'
}

version = "1.0.0"
group = "net.fabricworldguard"

repositories {
	maven { url = "https://maven.enginehub.org/repo/" }
	maven { url = "https://maven.terraformersmc.com/releases/" }
	mavenCentral()
}

dependencies {
	minecraft "com.mojang:minecraft:1.20.1"
	mappings "net.fabricmc:yarn:1.20.1+build.10:v2"

	// Используем стабильные и проверенные версии под Loom 1.5
	modImplementation "net.fabricmc:fabric-loader:0.15.11"
	modImplementation "net.fabricmc.fabric-api:fabric-api:0.92.0+1.20.1"

	// Поддержка WorldEdit API
	modCompileOnly "com.sk89q.worldedit:worldedit-core:7.2.15"

	modImplementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"
}

processResources {
	inputs.property "version", project.version
	filteringCharset "UTF-8"

	filesMatching("fabric.mod.json") {
		expand "version": project.version
	}
}

tasks.withType(JavaCompile).configureEach {
	it.options.release = 17
}

java {
	withSourcesJar()
	sourceCompatibility = JavaVersion.VERSION_17
	targetCompatibility = JavaVersion.VERSION_17
}